<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="icon" href="./icon-512.png">
<meta name="theme-color" content="#0f172a">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>出勤クエスト</title>
<style>
main {
  position: relative;
}
#viewLogin {
  overflow: hidden;   /* ← ログインだけ固定 */
display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  height:100%;
  padding:10px 20px;   /* 余白を小さく */
}

#viewEmployee,
#viewAdmin {
  overflow: auto;     /* ← 他はスクロールOK */
}

/* ロゴ大きく */
.login-logo{
  text-align:center;
  margin-bottom:60px;
}

/* 入力部分を少し下に */
.login-content{
  margin-top:20px;
}
.login-header{
  text-align:center;
  margin-bottom:20px;
}

.main-logo{
  width:100%;
  max-height:30vh;   /* ← これが超重要 */
  object-fit:contain;
  image-rendering:pixelated;
  margin:0;
}
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background:#0f172a; color:#e5e7eb;}
  header { background:#020617; padding:12px 16px; display:flex; align-items:center; justify-content:space-between;}
  h1 { font-size:18px; margin:0; }
  main { padding:0px; }
  .card { background:#020617; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 10px 20px rgba(0,0,0,.25); }
  input, button { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #1f2937; background:#020617; color:#e5e7eb; }
  button.primary { background:#2563eb; border-color:#2563eb; }
  button.warn { background:#7c2d12; border-color:#7c2d12; }
  button.ghost { background:#020617; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .list { display:flex; flex-direction:column; gap:8px; }
  .item { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px; border-radius:10px; background:#020617; border:1px solid #1f2937;}
  .muted { color:#9ca3af; }
  .badge { background:#1f2937; padding:4px 8px; border-radius:999px; }
  .topstats { display:flex; gap:8px; }
  .topstats .card { flex:1; text-align:center; }
  .hidden { display:none; }
  .danger { color:#fca5a5; }
  footer { padding:12px 16px; color:#9ca3af; text-align:center; }
.code-input {
  width: 100%;
  font-size: 24px;
  text-align: center;
  margin-bottom: 12px;
  padding: 12px;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.keypad button {
  aspect-ratio: 1 / 1;   /* 完全な正方形 */
  font-size: 22px;
  border-radius: 8px;    /* 角を少し丸める */
  font-weight: bold;
}

.keypad button:active {
  transform: scale(0.95);
}
/* ===== ドラクエ風基本 ===== */

body{
  background:#000;
  color:#fff;
  font-family:"MS Gothic", monospace;
  font-size:16px;
  letter-spacing:1px;
}

.card{
  background:#000;
  border:3px solid #fff;
  border-radius:0;
  box-shadow:none;
  padding:12px;
}

button{
  background:#000;
  color:#fff;
  border:2px solid #fff;
  border-radius:0;
  padding:6px 10px;
}

button.primary{
  background:#000;
}

button.warn{
  background:#000;
}

.badge{
  background:#000;
  color:#fff;
  border:1px solid #fff;
  border-radius:0;
}

.item{
  padding:4px 0;
  border-bottom:1px solid #333;
}

/* 経験値バー */
#expBar{
  background:#fff;
}

/* メッセージウィンドウ */
#dqMessage{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:480px;
  background:#000;
  border:3px solid #fff;
  padding:16px;
  z-index:9999;
}

/* 横画面用レイアウト */
@media (orientation: landscape) {

  #viewLogin {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 90vh;
    padding: 10px 20px;
  }

  /* ===== ロゴを枠いっぱい ===== */
  .login-logo {
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
  }
/* ===== 横画面ロゴ最大化 ===== */
.main-logo {
  width: 100% !important;
  max-width: none !important;
  max-height: 30vh;
  object-fit: contain;
}

 .main-logo{
  width:100%;
  max-height:35vh;
  object-fit:contain;
  image-rendering:pixelated;
  display:block;
}

  /* ===== 下段横並び ===== */
.login-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 30px;
  flex: 1;
  width: 100%;
}

  .login-left {
    flex: 1;
    max-width: 550px;
  }

  /* 入力を少し大きめ */
  .code-input {
    font-size: 28px;
    padding: 14px;
  }

  button.primary {
    font-size: 20px;
    padding: 12px;
  }

  /* ===== テンキー小さく ===== */
 .keypad {
  width: 28vw;        /* 画面幅の28% */
  max-width: 260px;   /* 大きくなりすぎ防止 */
}

  .keypad button {
    font-size: 18px;
    aspect-ratio: 1 / 1;
  }

}

</style>
</head>
<body>
<header>
  <h1>出勤クエスト</h1>
  <div id="headerRight" class="muted"></div>
</header>

<main>
<section id="viewLogin" class="card">


  <!-- ロゴ -->
  <div class="login-logo">
    <img src="shukkin_logo.png" class="main-logo">
  </div>

  <!-- 下段：入力＋テンキー -->
  <div class="login-bottom">

    <div class="login-left">
      <input id="loginCode"
             readonly
             placeholder="コードを入力"
             class="code-input"/>

      <button class="primary" onclick="login()">
        ▶ ぼうけんを はじめる
      </button>
    </div>

    <div class="keypad">
    <button onclick="addNum('1')">1</button>
    <button onclick="addNum('2')">2</button>
    <button onclick="addNum('3')">3</button>
    <button onclick="addNum('4')">4</button>
    <button onclick="addNum('5')">5</button>
    <button onclick="addNum('6')">6</button>
    <button onclick="addNum('7')">7</button>
    <button onclick="addNum('8')">8</button>
    <button onclick="addNum('9')">9</button>
    <button onclick="clearCode()">C</button>
    <button onclick="addNum('0')">0</button>
    <button onclick="backspace()">←</button>
  　</div>
</div>
</section>
  <!-- Employee -->
  <section id="viewEmployee" class="hidden">
    <div class="topstats">
      <div class="card">

  <div id="levelInfo" style="margin-top:8px;font-weight:bold;"></div>
  <div id="expInfo" class="muted"></div>
  <div id="nextLevelInfo" class="muted" style="margin-top:4px;"></div>

  <div style="background:#1f2937;border-radius:999px;height:14px;margin-top:6px;overflow:hidden;">
    <div id="expBar"
         style="height:100%;width:0%;background:#2563eb;transition:width .4s;"></div>
  </div>

  <div class="muted" style="margin-top:10px;">今日のポイント</div>
  <div id="todayPoints" style="font-size:24px;">0</div>

</div>
      <div class="card">
　  <h3>ポイント交換</h3>
      <div id="rewardShop"></div>
        <div class="muted">累計ポイント</div>
        <div id="totalPoints" style="font-size:24px;">0</div>
      </div>
    </div>

    <div class="card">
      <h3>今日のクエスト</h3>
      <div id="questList" class="list"></div>
    </div>
<div class="card">
  <h3>ポイントランキング</h3>
  <div id="rankingListEmployee" class="list"></div>
</div>

    <div class="card">
      <button class="ghost" onclick="logout()">ログアウト</button>
    </div>
  </section>

  <!-- Admin -->
  <section id="viewAdmin" class="hidden">
    <div class="card">
      <h3>管理者メニュー</h3>
      <div class="row">
        <button class="primary" onclick="showTab('adminEmployees')">従業員</button>
        <button class="primary" onclick="showTab('adminQuests')">クエスト</button>
<button onclick="showTab('adminRewards')">景品管理</button>
        <button class="primary" onclick="showTab('adminData')">データ</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <button class="warn" onclick="resetToday()">今日の進捗リセット</button>
        <button class="ghost" onclick="logout()">ログアウト</button>
      </div>
    </div>

    <!-- Employees -->
    <div id="adminEmployees" class="card hidden">
      <h3>従業員管理</h3>
      <div class="row">
     <input id="empCode"
       type="tel"
       inputmode="numeric"
       maxlength="7"
       placeholder="従業員コード"
       onkeydown="handleEmpCodeKey(event)" />
       <input id="empName"
       placeholder="名前"
       onkeydown="handleEmpNameKey(event)" />
<input id="empShiftName" placeholder="シフト表の苗字（例：山田）">
      </div>
      <div class="row" style="margin-top:8px;">
        <button class="primary" onclick="addEmployee()">追加</button>
      </div>
      <div id="employeeList" class="list" style="margin-top:12px;"></div>
    </div>

    <!-- Quests -->
    <div id="adminQuests" class="card hidden">
      <h3>クエスト管理（全員共通）</h3>
      <div class="row">
        <input id="qTitle" placeholder="例：レジ周り清掃" />
        <input id="qPoints" type="number" placeholder="ポイント" />
      </div>
      <div class="row" style="margin-top:8px;">
        <button class="primary" onclick="addQuest()">追加</button>
      </div>
      <div id="questAdminList" class="list" style="margin-top:12px;"></div>
    </div>
<div id="adminRewards" class="card hidden">

<h3>景品追加</h3>
  <input id="rewardTitle" placeholder="景品名">
  <input id="rewardCost" type="number" placeholder="必要ポイント">
  <button onclick="addReward()">追加</button>

  <div id="rewardAdminList"></div>

</div>
    <!-- Data -->
    <div id="adminData" class="card hidden">
      <h3>データ管理</h3>
      <button class="primary" onclick="exportData()">データ書き出し（JSON）</button>
      <input id="importFile" type="file" accept="application/json" style="margin-top:8px;" />
      <button class="ghost" style="margin-top:8px;" onclick="importData()">データ読み込み</button>
      <p class="muted">※ 書き出したファイルをBluetooth/共有/USBでスマホへ。戻すときは読み込み。</p>
<button onclick="exportEmployeesToCSV()">CSVエクスポート</button>
<button onclick="openShiftCSV()">シフトCSV読み込み</button>
<input id="shiftCsvInput" type="file" accept=".csv" style="display:none" onchange="loadShiftCSV(this.files[0])">
<h3 style="margin-top:20px;">交換履歴</h3>
<div id="exchangeHistoryList" class="list"></div>
 <button onclick="exportExchangeHistoryCSV()">交換履歴CSV出力</button>
<!-- 手動シフト追加 -->
<div class="card" style="margin-top:16px;">
  <h3>手動シフト追加（救済用）</h3>
  <div class="row">
    <input id="manualShiftName" placeholder="シフト表の苗字（例：山田）" />
    <input id="manualShiftDate" type="date" />
  </div>
  <div class="row" style="margin-top:8px;">
    <button class="primary" onclick="addManualShift()">この日を出勤扱いにする</button>
  </div>
  <p class="muted">※ シフト表に無い日でも、この日を出勤扱いにできます</p>
<h3 style="margin-top:20px;">ポイントランキング</h3>
<div id="rankingList" class="list"></div>
</div>
  </section>
</main>

<footer>出勤クエスト（オフライン対応）</footer>
<script>
const ADMIN_CODE = "3963233187";
const STORAGE_KEY = "shukkinQuestData_v3";

/* ================= STATE ================= */

let state = {
  employees:{},
  quests:[],
  rewards:[],
  today:{date:todayStr(),progress:{}},
  shiftTable:{},
  shiftOverrides:{},   // ← カンマ必要
  exchangeHistory:[]
};

let currentUser=null;
let isAdmin=false;

/* ===== サウンド ===== */
const attackSound = new Audio("attack.mp3");
const missSound = new Audio("miss.mp3");
const cursorSound   = new Audio("cursor.mp3");
const decisionSound = new Audio("decision.mp3");
const battleEndSound = new Audio("battle_end.mp3");

missSound.volume = 0.5;
cursorSound.volume = 0.4;
decisionSound.volume = 0.5;
battleEndSound.volume = 0.6;
attackSound.volume = 0.8;

function playAttack(){
  attackSound.currentTime = 0;
  attackSound.play();
}

function playMiss(){
  missSound.currentTime = 0;
  missSound.play();
}
function playCursor(){
  cursorSound.currentTime = 0;
  cursorSound.play();
}

function playDecision(){
  decisionSound.currentTime = 0;
  decisionSound.play();
}

function playBattleEnd(){
  battleEndSound.currentTime = 0;
  battleEndSound.play();
}
/* ================= UTIL ================= */

function todayStr(){

  const d = new Date();

  // ⭐ 朝6時より前は「前日扱い」
  if(d.getHours() < 6){
    d.setDate(d.getDate() - 1);
  }

  return d.getFullYear() + "-" +
         String(d.getMonth()+1).padStart(2,"0") + "-" +
         String(d.getDate()).padStart(2,"0");
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function load(){
  const raw=localStorage.getItem(STORAGE_KEY);

  if(raw){
    try{
      state = JSON.parse(raw);
    }catch(e){}
  }
Object.values(state.employees).forEach(emp=>{
  if(emp.totalEarned === undefined){
    emp.totalEarned = emp.totalPoints || 0;
  }
});
  // ⭐ ここが保険
  if(!state.rewards) state.rewards = [];
  if(!state.shiftTable) state.shiftTable = {};
  if(!state.shiftOverrides) state.shiftOverrides = {};
  if(!state.exchangeHistory) state.exchangeHistory = [];

  // 日付更新チェック
  if(!state.today || state.today.date !== todayStr()){
    resetToday(false);
  }
}

function ensureTodayRecord(code){
  if(!state.today.progress[code]){
    state.today.progress[code]={checked:{},todayPoints:0};
  }
}

/* ================= LOGIN ================= */

function login(){
playDecision();
  const code=document.getElementById("loginCode").value.trim();
  if(!code) return alert("コードを入力してください");

  if(code===ADMIN_CODE){
    isAdmin=true;
    currentUser=null;
    showAdmin();
    return;
  }

  if(!state.employees[code]){
    return alert("登録されていません");
  }

  currentUser=code;
  isAdmin=false;
  ensureTodayRecord(code);
if(!isShiftDay()){
  playMiss();
  showDQMessage("きょうは やすみのひ だった！");
}
  showEmployee();
}

function logout(){
  currentUser=null;
  isAdmin=false;
  document.getElementById("loginCode").value="";
  show("viewLogin");
}

/* ================= VIEW ================= */

function show(id){
  ["viewLogin","viewEmployee","viewAdmin"].forEach(v=>{
    const el=document.getElementById(v);
    if(el) el.classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function showAdmin(){
  document.getElementById("headerRight").textContent="管理者";
  show("viewAdmin");
  showTab("adminEmployees");
  renderAdmin();
}

function showEmployee(){
  document.getElementById("headerRight").textContent="従業員："+state.employees[currentUser].name;
  renderEmployee();
  show("viewEmployee");
}

function showTab(id){
  ["adminEmployees","adminQuests","adminRewards","adminData"].forEach(t=>{
    const el=document.getElementById(t);
    if(el) el.classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

/* ================= EMPLOYEE ================= */

function renderEmployee(){

  if(!currentUser) return;   // ← これ超重要

  const rec = state.today.progress[currentUser];
  if(!rec) return;

  const emp = state.employees[currentUser];
  if(!emp) return;

  document.getElementById("todayPoints").textContent = rec.todayPoints;
  document.getElementById("totalPoints").textContent = emp.totalPoints || 0;

const earned = emp.totalEarned || 0;
const levelData = getLevelInfo(earned);

document.getElementById("levelInfo").innerHTML =
  `Lv.${levelData.level} 【${levelData.title}】`;

document.getElementById("expInfo").textContent =
  `累計経験値：${earned} XP`;

const nextReq = getNextLevelRequirement(earned);

if(nextReq){

  const remain = nextReq - earned;

  document.getElementById("nextLevelInfo").textContent =
    `次のレベルまで あと ${remain} XP`;

  let currentBase = 0;

  if(earned >= 1000) currentBase = 1000;
  else if(earned >= 600) currentBase = 600;
  else if(earned >= 300) currentBase = 300;
  else if(earned >= 100) currentBase = 100;

  const percent =
    ((earned - currentBase) / (nextReq - currentBase)) * 100;

  document.getElementById("expBar").style.width =
    percent + "%";

}else{

  document.getElementById("nextLevelInfo").textContent =
    "★ 最大レベル ★";

  document.getElementById("expBar").style.width = "100%";
}

  const list=document.getElementById("questList");
  list.innerHTML="";

  state.quests.forEach(q=>{
    const done=!!rec.checked[q.id];
    const row=document.createElement("div");
    row.className="item";
    row.innerHTML=`<div><strong>${q.title}</strong> <span class="badge">${q.points}pt</span></div>`;

    const btn=document.createElement("button");

if(done){
  btn.textContent="✓ 完了";
  btn.className="ghost";
  btn.disabled=true;
}else{
  btn.textContent="たたかう";
  btn.className="primary";
  btn.disabled=false;
}

btn.onclick=()=>toggleQuest(q.id);
    row.appendChild(btn);
    list.appendChild(row);
  });

  showRewardShop();
renderEmployeeRanking();
}



/* ================= ADMIN ================= */

function addEmployee(){
  const code=document.getElementById("empCode").value.trim();
  const name=document.getElementById("empName").value.trim();
  const shift=document.getElementById("empShiftName").value.trim();

  if(!code||!name||!shift) return alert("入力してください");
  if(state.employees[code]) return alert("既に存在します");

 state.employees[code]={
  name,
  shiftName:shift,
  totalPoints:0,
  totalEarned:0   // ⭐追加
};
   save();
  renderAdmin();

document.getElementById("empCode").value = "";
document.getElementById("empName").value = "";
document.getElementById("empShiftName").value = "";

document.getElementById("empCode").focus();
}

function addQuest(){
  const title=document.getElementById("qTitle").value.trim();
  const points=parseInt(document.getElementById("qPoints").value,10);
  if(!title||isNaN(points)) return alert("入力してください");
  state.quests.push({id:"q"+Date.now(),title,points});
  save();
  renderAdmin();
document.getElementById("qTitle").value = "";
document.getElementById("qPoints").value = "";
document.getElementById("qTitle").focus();
}

function handleEmpCodeKey(e){

  if(e.key === "Enter"){

    const input = document.getElementById("empCode");

    // 数字以外を削除（念のため）
    input.value = input.value.replace(/\D/g,'');

    if(input.value.length === 7){

      // 名前欄へ移動
      document.getElementById("empName").focus();

    }else{

      alert("従業員コードは7桁で入力してください");

    }
  }
}

function handleEmpNameKey(e){

  if(e.key === "Enter"){

    document.getElementById("empShiftName").focus();
  }
}

function handleEmpShiftKey(e){

  if(e.key === "Enter"){

    addEmployee();   // 追加実行
  }
}

function renderAdmin(){

  /* ===== 従業員 ===== */
  const empList = document.getElementById("employeeList");
  empList.innerHTML = "";

  Object.entries(state.employees).forEach(([code,emp])=>{

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
      <div>
        <strong>${emp.name}</strong> (${code})
        <span class="badge">${emp.totalPoints || 0}pt</span>
      </div>
    `;

    const del = document.createElement("button");
    del.textContent = "削除";
    del.className = "warn";

    del.onclick = ()=>{
      if(confirm("本当に削除しますか？")){
        delete state.employees[code];
        delete state.today.progress[code];
        save();
        renderAdmin();
      }
    };

    row.appendChild(del);
    empList.appendChild(row);
  });

  /* ===== クエスト ===== */
  const questList = document.getElementById("questAdminList");
  if(questList){
    questList.innerHTML = "";

    state.quests.forEach(q=>{
      const row = document.createElement("div");
      row.className = "item";

      row.innerHTML = `
        <div>
          <strong>${q.title}</strong>
          <span class="badge">${q.points}pt</span>
        </div>
      `;

      const del = document.createElement("button");
      del.textContent = "削除";
      del.className = "warn";

      del.onclick = ()=>{
        if(confirm("本当に削除しますか？")){
          state.quests = state.quests.filter(x=>x.id!==q.id);

          // 進捗からも削除
          Object.values(state.today.progress).forEach(p=>{
            delete p.checked[q.id];
          });

          save();
          renderAdmin();
        }
      };
document.getElementById("empCode").value = "";
document.getElementById("empName").value = "";
document.getElementById("empShiftName").value = "";

document.getElementById("empCode").focus();
      row.appendChild(del);
      questList.appendChild(row);
    });
  }
renderAdminRewards();
  }

function renderAdminRewards(){
  const list = document.getElementById("rewardAdminList");
  if(!list) return;

  list.innerHTML = "";

  state.rewards.forEach(r=>{

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
      <div>
        <strong>${r.title}</strong>
        <span class="badge">${r.cost}pt</span>
      </div>
    `;

    const del = document.createElement("button");
    del.textContent = "削除";
    del.className = "warn";

    del.onclick = ()=>{
      if(confirm("本当に削除しますか？")){
        state.rewards = state.rewards.filter(x=>x.id!==r.id);
        save();
        renderAdminRewards();
      }
    };

    row.appendChild(del);
    list.appendChild(row);
  });
}

function exchangeReward(id){

    return alert("ポイントが不足しています");
  }

  if(!confirm(`${r.title} を交換しますか？`)) return;

  emp.totalPoints -= r.cost;

  state.exchangeHistory.push({
    name: emp.name,
    code: currentUser,
    reward: r.title,
    cost: r.cost,
    datetime: new Date().toLocaleString("ja-JP")
  });

  save();
  renderEmployee();
  alert("交換しました！");
}

function isShiftDay(){

  const emp = state.employees[currentUser];
  if(!emp || !emp.shiftName) return false;

  const today = new Date().toISOString().slice(0,10).replace(/-/g,"/");
  const name = emp.shiftName.trim();

  // ① 手動優先
  if(state.shiftOverrides[name] &&
     state.shiftOverrides[name][today]){
    return true;
  }

  // ② CSV判定
  if(state.shiftTable[name] &&
     state.shiftTable[name][today]){
    return true;
  }

  return false;
}
function parseShiftCSV(text){

  const rows = text.split("\n").map(r=>r.split(","));

  if(rows.length < 3){
    alert("CSV形式が不正です");
    return;
  }

  const dates = rows[0].slice(1).map(d=>d.trim().replace(/-/g,"/"));

  const table = {};

  for(let i=2;i<rows.length;i++){
    const row = rows[i];
    const name = row[0]?.trim();
    if(!name) continue;

    table[name]={};

    for(let j=1;j<row.length;j++){
      const cell = row[j]?.trim();
      if(cell && /[A-Za-z]/.test(cell)){
        table[name][dates[j-1]] = true;
      }
    }
  }

  state.shiftTable = table;
  save();
}

function getLevelInfo(totalPoints){

  if(totalPoints >= 1000){
    return {level:5, title:"店舗の守護神"};
  }
  if(totalPoints >= 600){
    return {level:4, title:"前陳の達人"};
  }
  if(totalPoints >= 300){
    return {level:3, title:"清掃マスター"};
  }
  if(totalPoints >= 100){
    return {level:2, title:"見習い戦士"};
  }

  return {level:1, title:"新人クルー"};
}
function getNextLevelRequirement(total){

  if(total < 100) return 100;
  if(total < 300) return 300;
  if(total < 600) return 600;
  if(total < 1000) return 1000;

  return null; // 最大レベル
}
function showLevelUpPopup(level){

  playLevelUpSound();

  showDQMessage(`レベルが あがった！\nLv.${level} に なった！`);
}
function playLevelUpSound(){

  const audio = new Audio("levelup.mp3");

  audio.volume = 0.1;

  audio.play().catch(err=>{
    console.log("音再生エラー", err);
  });
}

function toggleQuest(id){

  if(!isShiftDay()){
    playMiss();
    showDQMessage("しかし こうげきは あたらなかった！");
    return;
  }

  const rec = state.today.progress[currentUser];
  if(rec.checked[id]) return;

  const q = state.quests.find(x=>x.id===id);
  if(!q) return;

  const emp = state.employees[currentUser];

  const oldLevel = getLevelInfo(emp.totalEarned || 0).level;

  // 🗡 攻撃音
  playAttack();

  // 攻撃後 0.5秒待つ
  setTimeout(()=>{

    // クエスト達成処理
    rec.checked[id] = true;
    rec.todayPoints += q.points;

    emp.totalPoints += q.points;
    emp.totalEarned += q.points;

    const newLevel = getLevelInfo(emp.totalEarned).level;

    save();
    renderEmployee();

    showDQMessage(`${q.title} を たおした！\n${q.points}ポイント えた！`);

    const allDone = state.quests.every(q => rec.checked[q.id]);

    if(allDone){

      // 💥 戦闘終了音も少し間をあける
      setTimeout(()=>{
        playBattleEnd();

        // 勝利音後さらに間
        setTimeout(()=>{
          if(newLevel > oldLevel){
            showLevelUpPopup(newLevel);
          }
        },1000);

      },500);

    }else{

      if(newLevel > oldLevel){
        setTimeout(()=>{
          showLevelUpPopup(newLevel);
        },700);
      }

    }

  },500);
}
