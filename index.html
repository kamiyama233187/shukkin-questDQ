<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>出勤クエスト</title>

<style>
.hidden{
  display:none !important;
}
#viewEmployee,
#viewAdmin{
  padding:12px;
}
/* =============================
   出勤クエスト 完全CSS版
============================= */

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#fff;
  font-family:"MS Gothic", monospace;
  letter-spacing:1px;
}

/* =============================
   共通UI
============================= */

.hidden{
  display:none;
}

.card{
  background:#000;
  border:3px solid #fff;
  padding:12px;
  margin-bottom:12px;
}

button{
  background:#000;
  color:#fff;
  border:2px solid #fff;
  padding:8px;
  cursor:pointer;
}

button:active{
  transform:scale(0.95);
}

.badge{
  border:1px solid #fff;
  padding:2px 6px;
}

.list{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:4px 0;
}

.row{
  display:flex;
  gap:8px;
}

.row > *{
  flex:1;
}

/* =============================
   メッセージウィンドウ
============================= */

#dqMessage{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:480px;
  background:#000;
  border:3px solid #fff;
  padding:16px;
  z-index:9999;
}

/* =============================
   経験値バー
============================= */

#expBarWrap{
  height:14px;
  border:1px solid #fff;
  margin-top:6px;
}

#expBar{
  height:100%;
  width:0%;
  background:#fff;
  transition:0.4s;
}

/* =============================
   ログイン画面
============================= */

#viewLogin{
  min-height:100vh;
border:3px solid #fff;
  display:flex;
margin:12px;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

.main-logo{
  width:100%;
  max-height:35vh;
  object-fit:contain;
  image-rendering:pixelated;
}

/* 下段 */
.login-bottom{
  display:flex;
  gap:3vw;
  align-items:stretch;
  flex:1;
}

/* 左側（入力） */
.login-left{
  flex:1;
  max-width:600px;
}

.code-input{
  width:100%;
  font-size:clamp(20px,3vw,32px);
  text-align:center;
  margin-bottom:12px;
  padding:10px;
  background:#000;
  border:2px solid #fff;
  color:#fff;
}

/* テンキー */
.keypad{
  width:35%;
  max-width:400px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1vw;
}

.keypad button{
  aspect-ratio:1/1;
  font-size:clamp(16px,2vw,26px);
}

/* =============================
   従業員画面
============================= */

#viewEmployee{
  padding:16px;
  overflow:auto;
}

.topstats{
  display:flex;
  gap:12px;
}

.topstats .card{
  flex:1;
  text-align:center;
}

/* =============================
   管理画面
============================= */

#viewAdmin{
  padding:16px;
  overflow:auto;
}

input{
  background:#000;
  border:2px solid #fff;
  color:#fff;
  padding:6px;
}

/* =============================
   横画面最適化
============================= */

@media (orientation: landscape){

  #viewLogin{
    padding:20px 40px;
  }

  .main-logo{
    max-height:40vh;
  }

  .login-bottom{
    align-items:center;
  }

  .keypad{
    width:30%;
  }
}

/* =============================
   縦画面簡易対応
============================= */

@media (orientation: portrait){

  .login-bottom{
    flex-direction:column;
  }

  .keypad{
    width:100%;
    max-width:none;
  }
}
</style>
</head>
<body>

<!-- ログイン -->
<section id="viewLogin">
  <img src="shukkin_logo.png" class="main-logo">

  <div class="login-bottom">
    <div class="login-left">
      <input id="loginCode" readonly class="code-input" placeholder="コードを入力">
      <button onclick="login()">▶ ぼうけんを はじめる</button>
    </div>

    <div class="keypad">
      <button onclick="addNum('1')">1</button>
      <button onclick="addNum('2')">2</button>
      <button onclick="addNum('3')">3</button>
      <button onclick="addNum('4')">4</button>
      <button onclick="addNum('5')">5</button>
      <button onclick="addNum('6')">6</button>
      <button onclick="addNum('7')">7</button>
      <button onclick="addNum('8')">8</button>
      <button onclick="addNum('9')">9</button>
      <button onclick="clearCode()">C</button>
      <button onclick="addNum('0')">0</button>
      <button onclick="backspace()">←</button>
    </div>
  </div>
</section>

<!-- 従業員 -->
<section id="viewEmployee" class="hidden">

  <!-- ステータス -->
<div class="card">
  <div id="levelInfo"></div>
  <div id="expInfo"></div>
  <div id="nextLevelInfo"></div>

  <div>今日のポイント：<span id="todayPoints">0</span></div>
  <div>累計ポイント：<span id="totalPoints">0</span></div>

  <div id="expBarWrap">
    <div id="expBar"></div>
  </div>
</div>

  <!-- タブボタン -->
  <div class="card">
    <div class="row">
      <button onclick="showEmpTab('empQuest')">クエスト</button>
      <button onclick="showEmpTab('empShop')">ポイント交換</button>
      <button onclick="showEmpTab('empRanking')">ランキング</button>
    </div>
  </div>

  <!-- ===== クエストタブ ===== -->
  <div id="empQuest" class="card">
    <h3>今日のクエスト</h3>
    <div id="questList" class="list"></div>
  </div>

  <!-- ===== ショップタブ ===== -->
  <div id="empShop" class="card hidden">
    <h3>ポイント交換</h3>
    <div id="rewardShop" class="list"></div>
  </div>

  <!-- ===== ランキングタブ ===== -->
  <div id="empRanking" class="card hidden">
    <h3>ランキング</h3>
    <div id="rankingListEmployee" class="list"></div>
  </div>

  <div class="card">
    <button onclick="logout()">ログアウト</button>
  </div>

</section>

<section id="viewAdmin" class="hidden">

  <!-- メニュー -->
  <div class="card">
    <h2>管理者メニュー</h2>

    <div class="row">
      <button onclick="showTab('adminEmployees')">従業員</button>
      <button onclick="showTab('adminQuests')">クエスト</button>
      <button onclick="showTab('adminRewards')">景品</button>
      <button onclick="showTab('adminData')">データ</button>
    </div>

    <div style="margin-top:10px;">
      <button onclick="resetToday()">今日の進捗リセット</button>
      <button onclick="logout()">ログアウト</button>
    </div>
  </div>

  <!-- =============================
       従業員管理
  ============================= -->
  <div id="adminEmployees" class="card">
    <h3>従業員管理</h3>

    <div class="row">
      <input id="empCode"
       type="tel"
       inputmode="numeric"
       pattern="[0-9]*"
       maxlength="7"
       placeholder="従業員コード"
       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
       onkeydown="handleEmpCodeKey(event)">
      <input id="empName" placeholder="名前">
      <input id="empShiftName" placeholder="シフト苗字">
    </div>

    <div style="margin-top:10px;">
      <button onclick="addEmployee()">追加</button>
    </div>

    <div id="employeeList" class="list" style="margin-top:12px;"></div>
  </div>

  <!-- =============================
       クエスト管理
  ============================= -->
  <div id="adminQuests" class="card hidden">
    <h3>クエスト管理</h3>

    <div class="row">
      <input id="qTitle" placeholder="クエスト名">
      <input id="qPoints" type="number" placeholder="ポイント">
    </div>

    <div style="margin-top:10px;">
      <button onclick="addQuest()">追加</button>
    </div>

    <div id="questAdminList" class="list" style="margin-top:12px;"></div>
  </div>

  <!-- =============================
       景品管理
  ============================= -->
  <div id="adminRewards" class="card hidden">
    <h3>景品管理</h3>

    <div class="row">
      <input id="rewardTitle" placeholder="景品名">
      <input id="rewardCost" type="number" placeholder="必要ポイント">
    </div>

    <div style="margin-top:10px;">
      <button onclick="addReward()">追加</button>
    </div>

    <div id="rewardAdminList" class="list" style="margin-top:12px;"></div>
  </div>

  <!-- =============================
       データ管理
  ============================= -->
  <div id="adminData" class="card hidden">
    <h3>データ管理</h3>

    <button onclick="exportData()">JSON書き出し</button>
    <input id="importFile" type="file" accept="application/json">
    <button onclick="importData()">JSON読み込み</button>
<hr style="margin:20px 0;">

<h3>CSV機能</h3>

<button onclick="exportEmployeesToCSV()">従業員CSV出力</button>

<button onclick="openShiftCSV()">シフトCSV読み込み</button>
<input id="shiftCsvInput"
       type="file"
       accept=".csv"
       style="display:none"
       onchange="loadShiftCSV(this.files[0])">

<button onclick="exportExchangeHistoryCSV()">交換履歴CSV出力</button>
    <div style="margin-top:20px;">
      <h3>ランキング</h3>
      <div id="rankingList" class="list"></div>
    </div>

    <div style="margin-top:20px;">
      <h3>交換履歴</h3>
      <div id="exchangeHistoryList" class="list"></div>
      <button onclick="exportExchangeHistoryCSV()">履歴CSV出力</button>
    </div>
<hr style="margin:20px 0;">

<h3>手動シフト追加（救済用）</h3>

<div class="row">
  <input id="manualShiftName" placeholder="シフト苗字（例：山田）">
  <input id="manualShiftDate" type="date">
</div>

<div style="margin-top:10px;">
  <button onclick="addManualShift()">この日を出勤扱いにする</button>
</div>
  </div>

</section>
<script>
const ADMIN_CODE = "3963233187";
const STORAGE_KEY = "shukkinQuestData_v3";

/* ================= STATE ================= */

let state = {
  employees:{},
  quests:[],
  rewards:[],
  today:{date:todayStr(),progress:{}},
  shiftTable:{},
  shiftOverrides:{},   // ← カンマ必要
  exchangeHistory:[]
};

let currentUser=null;
let isAdmin=false;

/* ===== サウンド ===== */
const attackSound = new Audio("attack.mp3");
const missSound = new Audio("miss.mp3");
const cursorSound   = new Audio("cursor.mp3");
const decisionSound = new Audio("decision.mp3");
const battleEndSound = new Audio("battle_end.mp3");

missSound.volume = 0.5;
cursorSound.volume = 0.4;
decisionSound.volume = 0.5;
battleEndSound.volume = 0.6;
attackSound.volume = 0.8;

function playAttack(){
  attackSound.currentTime = 0;
  attackSound.play();
}

function playMiss(){
  missSound.currentTime = 0;
  missSound.play();
}
function playCursor(){
  cursorSound.currentTime = 0;
  cursorSound.play();
}

function playDecision(){
  decisionSound.currentTime = 0;
  decisionSound.play();
}

function playBattleEnd(){
  battleEndSound.currentTime = 0;
  battleEndSound.play();
}
/* ================= UTIL ================= */

function todayStr(){

  const d = new Date();

  // ⭐ 朝6時より前は「前日扱い」
  if(d.getHours() < 6){
    d.setDate(d.getDate() - 1);
  }

  return d.getFullYear() + "-" +
         String(d.getMonth()+1).padStart(2,"0") + "-" +
         String(d.getDate()).padStart(2,"0");
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function load(){
  const raw=localStorage.getItem(STORAGE_KEY);

  if(raw){
    try{
      state = JSON.parse(raw);
    }catch(e){}
  }
Object.values(state.employees).forEach(emp=>{
  if(emp.totalEarned === undefined){
    emp.totalEarned = emp.totalPoints || 0;
  }
});
  // ⭐ ここが保険
  if(!state.rewards) state.rewards = [];
  if(!state.shiftTable) state.shiftTable = {};
  if(!state.shiftOverrides) state.shiftOverrides = {};
  if(!state.exchangeHistory) state.exchangeHistory = [];

  // 日付更新チェック
  if(!state.today || state.today.date !== todayStr()){
    resetToday(false);
  }
}

function ensureTodayRecord(code){
  if(!state.today.progress[code]){
    state.today.progress[code]={checked:{},todayPoints:0};
  }
}

/* ================= LOGIN ================= */

function login(){
  playDecision();

  const code = document.getElementById("loginCode").value.trim();
  if(!code) return alert("コードを入力してください");

  if(code === ADMIN_CODE){
    isAdmin = true;
    currentUser = null;
    showAdmin();
    return;
  }

  if(!state.employees[code]){
    return alert("登録されていません");
  }

  currentUser = code;
  isAdmin = false;

  ensureTodayRecord(code);

  showEmployee();   // ← 先に画面切り替え

  if(!isShiftDay()){
    showDQMessage("きょうは やすみのひ だった！");
  }
}

function logout(){
  currentUser=null;
  isAdmin=false;
  document.getElementById("loginCode").value="";
  show("viewLogin");
}

/* ================= VIEW ================= */

function show(id){

  const views=["viewLogin","viewEmployee","viewAdmin"];

  views.forEach(v=>{
    const el=document.getElementById(v);
    if(!el) return;
    el.classList.add("hidden");
  });

  const target=document.getElementById(id);
  if(target){
    target.classList.remove("hidden");
  }

  window.scrollTo(0,0);
}

function showAdmin(){
  show("viewAdmin");
  showTab("adminEmployees");
  renderAdmin();
renderExchangeHistory();
  renderRanking();
}

function showEmployee(){
  renderEmployee();
  show("viewEmployee");
  showEmpTab("empQuest"); // ←追加
}

function showTab(id){
  ["adminEmployees","adminQuests","adminRewards","adminData"].forEach(t=>{
    const el=document.getElementById(t);
    if(el) el.classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

/* ================= EMPLOYEE ================= */

function renderEmployee(){

  if(!currentUser) return;   // ← これ超重要

  const rec = state.today.progress[currentUser];
  if(!rec) return;

  const emp = state.employees[currentUser];
  if(!emp) return;

  document.getElementById("todayPoints").textContent = rec.todayPoints;
  document.getElementById("totalPoints").textContent = emp.totalPoints || 0;

const earned = emp.totalEarned || 0;
const levelData = getLevelInfo(earned);

document.getElementById("levelInfo").innerHTML =
  `Lv.${levelData.level}　
   ${emp.name}　
   【${levelData.title}】`;

document.getElementById("expInfo").textContent =
  `累計経験値：${earned} XP`;

const nextReq = getNextLevelRequirement(earned);

if(nextReq){

  const remain = nextReq - earned;

  document.getElementById("nextLevelInfo").textContent =
    `次のレベルまで あと ${remain} XP`;

  let currentBase = 0;

  if(earned >= 1000) currentBase = 1000;
  else if(earned >= 600) currentBase = 600;
  else if(earned >= 300) currentBase = 300;
  else if(earned >= 100) currentBase = 100;

  const percent =
    ((earned - currentBase) / (nextReq - currentBase)) * 100;

  document.getElementById("expBar").style.width =
    percent + "%";

}else{

  document.getElementById("nextLevelInfo").textContent =
    "★ 最大レベル ★";

  document.getElementById("expBar").style.width = "100%";
}

  const list=document.getElementById("questList");
  list.innerHTML="";

  state.quests.forEach(q=>{
    const done=!!rec.checked[q.id];
    const row=document.createElement("div");
    row.className="item";
    row.innerHTML=`<div><strong>${q.title}</strong> <span class="badge">${q.points}pt</span></div>`;

    const btn=document.createElement("button");

if(done){
  btn.textContent="✓ 完了";
  btn.className="ghost";
  btn.disabled=true;
}else{
  btn.textContent="たたかう";
  btn.className="primary";
  btn.disabled=false;
}

btn.onclick=()=>toggleQuest(q.id);
    row.appendChild(btn);
    list.appendChild(row);
  });

  showRewardShop();
renderEmployeeRanking();
}



/* ================= ADMIN ================= */

function addEmployee(){
  const code=document.getElementById("empCode").value.trim();
  const name=document.getElementById("empName").value.trim();
  const shift=document.getElementById("empShiftName").value.trim();

  if(!code||!name||!shift) return alert("入力してください");
  if(state.employees[code]) return alert("既に存在します");

 state.employees[code]={
  name,
  shiftName:shift,
  totalPoints:0,
  totalEarned:0   // ⭐追加
};
   save();
  renderAdmin();

document.getElementById("empCode").value = "";
document.getElementById("empName").value = "";
document.getElementById("empShiftName").value = "";

document.getElementById("empCode").focus();
}

function addQuest(){
  const title=document.getElementById("qTitle").value.trim();
  const points=parseInt(document.getElementById("qPoints").value,10);
  if(!title||isNaN(points)) return alert("入力してください");
  state.quests.push({id:"q"+Date.now(),title,points});
  save();
  renderAdmin();
document.getElementById("qTitle").value = "";
document.getElementById("qPoints").value = "";
document.getElementById("qTitle").focus();
}

function handleEmpCodeKey(e){

  if(e.key === "Enter"){

    const input = document.getElementById("empCode");

    // 数字以外を削除（念のため）
    input.value = input.value.replace(/\D/g,'');

    if(input.value.length === 7){

      // 名前欄へ移動
      document.getElementById("empName").focus();

    }else{

      alert("従業員コードは7桁で入力してください");

    }
  }
}

function handleEmpNameKey(e){

  if(e.key === "Enter"){

    document.getElementById("empShiftName").focus();
  }
}

function handleEmpShiftKey(e){

  if(e.key === "Enter"){

    addEmployee();   // 追加実行
  }
}

function renderAdmin(){

  /* ===== 従業員 ===== */
  const empList = document.getElementById("employeeList");
  empList.innerHTML = "";

  Object.entries(state.employees).forEach(([code,emp])=>{

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
      <div>
        <strong>${emp.name}</strong> (${code})
        <span class="badge">${emp.totalPoints || 0}pt</span>
      </div>
    `;

    const del = document.createElement("button");
    del.textContent = "削除";
    del.className = "warn";

    del.onclick = ()=>{
      if(confirm("本当に削除しますか？")){
        delete state.employees[code];
        delete state.today.progress[code];
        save();
        renderAdmin();
      }
    };

    row.appendChild(del);
    empList.appendChild(row);
  });

  /* ===== クエスト ===== */
  const questList = document.getElementById("questAdminList");
  if(questList){
    questList.innerHTML = "";

    state.quests.forEach(q=>{
      const row = document.createElement("div");
      row.className = "item";

      row.innerHTML = `
        <div>
          <strong>${q.title}</strong>
          <span class="badge">${q.points}pt</span>
        </div>
      `;

      const del = document.createElement("button");
      del.textContent = "削除";
      del.className = "warn";

      del.onclick = ()=>{
        if(confirm("本当に削除しますか？")){
          state.quests = state.quests.filter(x=>x.id!==q.id);

          // 進捗からも削除
          Object.values(state.today.progress).forEach(p=>{
            delete p.checked[q.id];
          });

          save();
          renderAdmin();
        }
      };
document.getElementById("empCode").value = "";
document.getElementById("empName").value = "";
document.getElementById("empShiftName").value = "";

document.getElementById("empCode").focus();
      row.appendChild(del);
      questList.appendChild(row);
    });
  }
renderAdminRewards();
  }

function renderAdminRewards(){
  const list = document.getElementById("rewardAdminList");
  if(!list) return;

  list.innerHTML = "";

  state.rewards.forEach(r=>{

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
      <div>
        <strong>${r.title}</strong>
        <span class="badge">${r.cost}pt</span>
      </div>
    `;

    const del = document.createElement("button");
    del.textContent = "削除";
    del.className = "warn";

    del.onclick = ()=>{
      if(confirm("本当に削除しますか？")){
        state.rewards = state.rewards.filter(x=>x.id!==r.id);
        save();
        renderAdminRewards();
      }
    };

    row.appendChild(del);
    list.appendChild(row);
  });
}

/* ================= REWARDS ================= */

function addReward(){
  const title=document.getElementById("rewardTitle").value.trim();
  const cost=parseInt(document.getElementById("rewardCost").value,10);
  if(!title||isNaN(cost)) return alert("入力してください");
  state.rewards.push({id:"r"+Date.now(),title,cost});
  save();
  renderAdminRewards();
document.getElementById("rewardTitle").value = "";
document.getElementById("rewardCost").value = "";
document.getElementById("rewardTitle").focus();
}


function showRewardShop(){
  const shop=document.getElementById("rewardShop");
  if(!shop||!currentUser) return;
  shop.innerHTML="";
  const pt=state.employees[currentUser].totalPoints;

  state.rewards.forEach(r=>{
    const row=document.createElement("div");
    row.className="item";
    row.innerHTML=`<div><strong>${r.title}</strong> <span class="badge">${r.cost}pt</span></div>`;
   const btn=document.createElement("button");

if(pt < r.cost){
  btn.textContent="ポイント不足";
  btn.className="ghost";
  btn.disabled=true;
}else{
  btn.textContent="交換";
  btn.className="primary";
  btn.disabled=false;
}

btn.onclick=()=>exchangeReward(r.id);
    row.appendChild(btn);
    shop.appendChild(row);
  });
}

function exchangeReward(id){

  const r = state.rewards.find(x=>x.id===id);
  if(!r) return;

  const emp = state.employees[currentUser];

  if(emp.totalPoints < r.cost){
    return alert("ポイントが不足しています");
  }

  if(!confirm(`${r.title} を交換しますか？`)) return;

  emp.totalPoints -= r.cost;

  state.exchangeHistory.push({
    name: emp.name,
    code: currentUser,
    reward: r.title,
    cost: r.cost,
    datetime: new Date().toLocaleString("ja-JP")
  });

  save();
  renderEmployee();

function isShiftDay(){

  const emp = state.employees[currentUser];
  if(!emp || !emp.shiftName) return false;

  const today = new Date().toISOString().slice(0,10).replace(/-/g,"/");
  const name = emp.shiftName.trim();

  // ① 手動優先
  if(state.shiftOverrides[name] &&
     state.shiftOverrides[name][today]){
    return true;
  }

  // ② CSV判定
  if(state.shiftTable[name] &&
     state.shiftTable[name][today]){
    return true;
  }

  return false;
}
function parseShiftCSV(text){

  const rows = text.split("\n").map(r=>r.split(","));

  if(rows.length < 3){
    alert("CSV形式が不正です");
    return;
  }

  const dates = rows[0].slice(1).map(d=>d.trim().replace(/-/g,"/"));

  const table = {};

  for(let i=2;i<rows.length;i++){
    const row = rows[i];
    const name = row[0]?.trim();
    if(!name) continue;

    table[name]={};

    for(let j=1;j<row.length;j++){
      const cell = row[j]?.trim();
      if(cell && /[A-Za-z]/.test(cell)){
        table[name][dates[j-1]] = true;
      }
    }
  }

  state.shiftTable = table;
  save();
}

function getLevelInfo(totalPoints){

  if(totalPoints >= 1000){
    return {level:5, title:"店舗の守護神"};
  }
  if(totalPoints >= 600){
    return {level:4, title:"前陳の達人"};
  }
  if(totalPoints >= 300){
    return {level:3, title:"清掃マスター"};
  }
  if(totalPoints >= 100){
    return {level:2, title:"見習い戦士"};
  }

  return {level:1, title:"新人クルー"};
}
function getNextLevelRequirement(total){

  if(total < 100) return 100;
  if(total < 300) return 300;
  if(total < 600) return 600;
  if(total < 1000) return 1000;

  return null; // 最大レベル
}
function showLevelUpPopup(level){

  playLevelUpSound();

  showDQMessage(`レベルが あがった！\nLv.${level} に なった！`);

  const audio = new Audio("levelup.mp3");

}

function toggleQuest(id){

  if(!isShiftDay()){
    playMiss();
    showDQMessage("しかし こうげきは あたらなかった！");
    return;
  }

  const rec = state.today.progress[currentUser];
  if(rec.checked[id]) return;

  const q = state.quests.find(x=>x.id===id);
  if(!q) return;

  const emp = state.employees[currentUser];

  const oldLevel = getLevelInfo(emp.totalEarned || 0).level;

  // 🗡 攻撃音
  playAttack();

  // 攻撃後 0.5秒待つ
  setTimeout(()=>{

    // クエスト達成処理
    rec.checked[id] = true;
    rec.todayPoints += q.points;

    emp.totalPoints += q.points;
    emp.totalEarned += q.points;

    const newLevel = getLevelInfo(emp.totalEarned).level;

    save();
    renderEmployee();

    showDQMessage(`${q.title} を たおした！\n${q.points}ポイント えた！`);

    const allDone = state.quests.every(q => rec.checked[q.id]);

    if(allDone){

      // 💥 戦闘終了音も少し間をあける
      setTimeout(()=>{
        playBattleEnd();

        // 勝利音後さらに間
        setTimeout(()=>{
          if(newLevel > oldLevel){
            showLevelUpPopup(newLevel);
          }
        },1000);

      },500);

    }else{

      if(newLevel > oldLevel){
        setTimeout(()=>{
          showLevelUpPopup(newLevel);
        },700);
      }

    }

  },500);
}
